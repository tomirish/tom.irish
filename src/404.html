<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="robots" content="noindex"/>
  <title>404 — tom.irish</title>
  <style>
    @font-face {
      font-family: 'DM Sans';
      font-style: normal;
      font-weight: 400 600;
      font-display: swap;
      src: url('/assets/fonts/dm-sans-latin.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Playfair Display';
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url('/assets/fonts/playfair-display-latin.woff2') format('woff2');
    }

    :root {
      --bg:     #faf9f7;
      --text-1: #111;
      --text-2: #555;
      --accent: #9b2335;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:     #131313;
        --text-1: #f0ece8;
        --text-2: #aaa;
        --accent: #c4394e;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 1rem;
      padding: 2rem;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 700;
      font-size: 6rem;
      color: var(--accent);
      line-height: 1;
    }

    p {
      font-size: 1.125rem;
      color: var(--text-2);
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>Page not found.</p>
  <a href="/">← tom.irish</a>
</body>
</html>
