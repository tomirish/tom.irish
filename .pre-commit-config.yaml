repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff

  - repo: local
    hooks:
      - id: validate-resume
        name: Validate resume.md
        entry: python3 scripts/validate_resume.py
        language: system
        files: ^resume\.md$
        pass_filenames: false
