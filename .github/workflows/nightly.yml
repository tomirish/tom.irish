name: Nightly Audit

on:
  schedule:
    - cron: '0 2 * * *'  # Daily, 2 AM UTC
  workflow_dispatch:

jobs:
  nightly:
    name: Nightly Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Python setup
        uses: ./.github/actions/setup

      - name: Audit dependencies for known vulnerabilities
        id: pip_audit
        run: pip-audit --cache-dir /tmp/pip-audit-cache 2>&1 | tee /tmp/pip-audit.txt; exit ${PIPESTATUS[0]}

      - name: Check links in resume
        id: check_links
        run: python scripts/build/check_links.py 2>&1 | tee /tmp/check-links.txt; exit ${PIPESTATUS[0]}

      - name: Run Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18  # v12
        with:
          configPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Open issue on failure
        if: failure()
        run: |
          gh label create "nightly-failure" --color "e11d48" --description "Nightly audit failure" --force
          existing=$(gh issue list --label "nightly-failure" --state open --json number --jq 'length')
          if [ "$existing" = "0" ]; then
            gh issue create \
              --title "Nightly check failed $(date +%Y-%m-%d)" \
              --label "nightly-failure" \
              --body "A nightly check failed. See the run for details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write nightly summary
        if: always()
        run: |
          python3 - <<'EOF'
          import json, glob, os

          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/stdout')

          def badge(score):
              if score >= 90: return '🟢'
              if score >= 50: return '🟡'
              return '🔴'

          with open(summary_path, 'a') as out:
              # Dependency audit
              out.write('## 🔒 Dependency Audit\n\n')
              try:
                  content = open('/tmp/pip-audit.txt').read().strip()
                  if 'No known vulnerabilities found' in content:
                      out.write('✅ No known vulnerabilities found\n\n')
                  else:
                      out.write('❌ Vulnerabilities detected\n\n```\n' + content + '\n```\n\n')
              except FileNotFoundError:
                  out.write('⚠️ pip-audit did not run\n\n')

              # Link check
              out.write('## 🔗 Link Check\n\n')
              try:
                  content = open('/tmp/check-links.txt').read().strip()
                  out.write('```\n' + content + '\n```\n\n')
              except FileNotFoundError:
                  out.write('⚠️ Link check did not run\n\n')

              # Lighthouse
              out.write('## 🔦 Lighthouse\n\n')
              files = sorted(glob.glob('.lighthouseci/lhr-*.json'))
              if not files:
                  out.write('⚠️ No Lighthouse results found\n')
              else:
                  scores = {}
                  for f in files:
                      with open(f) as fh:
                          data = json.load(fh)
                      for key, cat in data.get('categories', {}).items():
                          if cat.get('score') is not None:
                              scores.setdefault(key, []).append(round(cat['score'] * 100))
                  labels = {
                      'performance':    'Performance',
                      'accessibility':  'Accessibility',
                      'best-practices': 'Best Practices',
                      'seo':            'SEO',
                  }
                  n = len(files)
                  header = '| Category |' + ''.join(f' Run {i+1} |' for i in range(n)) + ' Avg |\n'
                  sep = '|---|' + '---|' * n + '---|\n'
                  out.write(header + sep)
                  for key in ['performance', 'accessibility', 'best-practices', 'seo']:
                      if key in scores:
                          vals = scores[key]
                          avg_score = sum(vals) / len(vals)
                          row = f'| {labels[key]} |'
                          for v in vals:
                              row += f' {badge(v)} {v} |'
                          row += f' {badge(avg_score)} {avg_score:.0f} |\n'
                          out.write(row)
          EOF

      - name: Update nightly badge
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, glob, subprocess, os

          all_ok = (
              os.environ.get('PIP_AUDIT_OUTCOME') == 'success' and
              os.environ.get('CHECK_LINKS_OUTCOME') == 'success' and
              os.environ.get('LIGHTHOUSE_OUTCOME') == 'success'
          )

          files = glob.glob('.lighthouseci/lhr-*.json')
          avg: int | None = None
          if files:
              scores = []
              for f in files:
                  with open(f) as fh:
                      data = json.load(fh)
                  perf = data.get('categories', {}).get('performance', {}).get('score')
                  if perf is not None:
                      scores.append(round(perf * 100))
              if scores:
                  avg = round(sum(scores) / len(scores))

          status = 'passing' if all_ok else 'failing'
          if avg is not None:
              message = f'{status} · {avg}'
              color = '#2EBC4F' if (all_ok and avg >= 90) else 'yellow' if (all_ok and avg >= 50) else 'red'
          else:
              message = status
              color = '#2EBC4F' if all_ok else 'red'

          payload = json.dumps({
              'schemaVersion': 1,
              'label': 'Nightly Audit',
              'message': message,
              'color': color,
              'labelColor': '343B42',
              'namedLogo': 'github',
              'logoColor': '959DA5',
          })
          subprocess.run([
              'gh', 'api', '--method', 'PATCH',
              '/gists/cfcbef4e90b3367512488562c649334e',
              '--field', f'files[lighthouse.json][content]={payload}',
          ], check=True)
          PYEOF
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          PIP_AUDIT_OUTCOME: ${{ steps.pip_audit.outcome }}
          CHECK_LINKS_OUTCOME: ${{ steps.check_links.outcome }}
          LIGHTHOUSE_OUTCOME: ${{ steps.lighthouse.outcome }}
