name: Build, Test, Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build, Test, Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Python setup
        uses: ./.github/actions/setup

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit --cache-dir /tmp/pip-audit-cache

      - name: Install Node dependencies
        run: npm ci

      - name: Lint CSS
        run: npx stylelint "src/*.css"

      - name: Lint Python
        run: ruff check scripts/build/ scripts/tools/ tests/

      - name: Type-check Python
        run: mypy scripts/build/ scripts/tools/

      - name: Validate resume format
        run: |
          python scripts/build/validate_resume.py

      - name: Check links in resume
        run: |
          python scripts/build/check_links.py

      - name: Convert markdown to HTML
        run: |
          python scripts/build/convert_resume.py

      - name: Generate PDF and share image
        run: |
          python scripts/build/generate_pdf_browser.py &
          python scripts/build/generate_share_image.py &
          wait

      - name: Run tests
        run: |
          pytest tests/ -v 2>&1 | tee /tmp/pytest-out.txt; exit ${PIPESTATUS[0]}

      - name: Sync files to public directory
        run: |
          mkdir -p public/.well-known
          cp index.html public/
          cp resume.pdf public/
          cp src/robots.txt public/
          cp src/sitemap.xml public/
          cp src/_headers public/
          cp src/404.html public/
          cp src/.well-known/security.txt public/.well-known/
          cp -r assets public/
          cp src/history.html public/
          echo "✅ Synced files to public/ directory"

      - name: Attest build artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: |
            public/index.html
            public/resume.pdf

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd  # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: pages deploy public/ --project-name=tom-irish --commit-dirty=true

      - name: Create deployment summary
        if: success()
        run: |
          TEST_RESULT=$(grep -oE '[0-9]+ passed in [0-9.]+s' /tmp/pytest-out.txt | tail -1 || echo 'unknown')
          SHA="${{ github.sha }}"
          echo "## 🚀 Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Your site is now live at: **https://tom.irish**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Steps:" >> $GITHUB_STEP_SUMMARY
          echo "- Tests passed: ✅ ($TEST_RESULT)" >> $GITHUB_STEP_SUMMARY
          echo "- Resume validated: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- HTML generated: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- PDF and share image generated: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Public directory synced: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Deployed to Cloudflare Pages: ✅ (\`${SHA:0:7}\`)" >> $GITHUB_STEP_SUMMARY

      - name: Create failure summary
        if: failure()
        run: |
          echo "## ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The build did not complete. Check the step logs above to see which step failed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Common causes:" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests failed** — a script change broke existing behaviour" >> $GITHUB_STEP_SUMMARY
          echo "- **Validation failed** — resume.md is missing a required section" >> $GITHUB_STEP_SUMMARY
          echo "- **Conversion failed** — index.html is missing an expected element ID" >> $GITHUB_STEP_SUMMARY
          echo "- **PDF generation failed** — Playwright/Chromium error or port conflict" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**The live site has not been updated.**" >> $GITHUB_STEP_SUMMARY
