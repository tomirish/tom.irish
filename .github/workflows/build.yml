name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'  # Daily, 2 AM UTC

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build HTML and PDF
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit

      - name: Validate resume format
        run: |
          python scripts/validate_resume.py

      - name: Check links in resume
        run: |
          python scripts/check_links.py

      - name: Convert markdown to HTML
        run: |
          python scripts/convert_resume.py

      - name: Generate PDF and share image
        run: |
          python scripts/generate_pdf_browser.py &
          python scripts/generate_share_image.py &
          wait

      - name: Run tests
        run: |
          pytest tests/ -v

      - name: Sync files to public directory
        run: |
          mkdir -p public
          cp index.html public/
          cp resume.pdf public/
          cp robots.txt public/
          cp sitemap.xml public/
          cp _headers public/
          cp -r assets public/
          echo "✅ Synced files to public/ directory"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public/ --project-name=tom-irish --commit-dirty=true

      - name: Create deployment summary
        if: success()
        run: |
          echo "## 🚀 Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Your site is now live at: **https://tom.irish**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Steps:" >> $GITHUB_STEP_SUMMARY
          echo "- Tests passed: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Resume validated: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- HTML generated: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- PDF and share image generated: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Public directory synced: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Deployed to Cloudflare Pages: ✅" >> $GITHUB_STEP_SUMMARY

      - name: Create failure summary
        if: failure()
        run: |
          echo "## ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The build did not complete. Check the step logs above to see which step failed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Common causes:" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests failed** — a script change broke existing behaviour" >> $GITHUB_STEP_SUMMARY
          echo "- **Validation failed** — resume.md is missing a required section" >> $GITHUB_STEP_SUMMARY
          echo "- **Conversion failed** — index.html is missing an expected element ID" >> $GITHUB_STEP_SUMMARY
          echo "- **PDF generation failed** — Playwright/Chromium error or port conflict" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**The live site has not been updated.**" >> $GITHUB_STEP_SUMMARY

  nightly:
    name: Nightly Checks
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit

      - name: Check links in resume
        run: python scripts/check_links.py

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          outputDir: ./lighthouse-results

      - name: Write Lighthouse summary
        if: always()
        run: |
          python3 - <<'EOF'
          import json, glob, os

          files = glob.glob('./lighthouse-results/lhr-*.json')
          if not files:
              print("No Lighthouse results found")
              exit(0)

          scores = {}
          for f in files:
              with open(f) as fh:
                  data = json.load(fh)
              for key, cat in data.get('categories', {}).items():
                  scores.setdefault(key, []).append(round(cat['score'] * 100))

          avg = {k: sum(v) / len(v) for k, v in scores.items()}

          def badge(score):
              if score >= 90: return '🟢'
              if score >= 50: return '🟡'
              return '🔴'

          labels = {
              'performance':    'Performance',
              'accessibility':  'Accessibility',
              'best-practices': 'Best Practices',
              'seo':            'SEO',
          }

          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/stdout')
          with open(summary_path, 'a') as f:
              f.write('## 🔦 Lighthouse Results\n\n')
              f.write('| Category | Score |\n')
              f.write('|---|---|\n')
              for key in ['performance', 'accessibility', 'best-practices', 'seo']:
                  if key in avg:
                      score = avg[key]
                      f.write(f'| {labels[key]} | {badge(score)} {score:.0f} |\n')
              f.write(f'\n_Averaged over {len(files)} run(s)_\n')
          EOF
